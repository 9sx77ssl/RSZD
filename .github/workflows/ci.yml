name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate imports
        run: |
          python - <<'PY'
          import main
          import rszdownloader
          import rszdownloader.downloader
          import rszdownloader.handlers
          print("imports ok")
          PY

      - name: Compile project
        run: python -m compileall main.py rszdownloader tests

      - name: Check installer syntax
        run: bash -n install.sh

      - name: Run tests
        run: python -m pytest
